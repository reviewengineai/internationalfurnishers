    justify-content: center;

    gap: 0;

    text-align: center;

    letter-spacing: 7px;

    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(212,168,82,0.65);
    margin-top: 6px;
  }

    width: 100%;
    max-width: 450px;
    background: rgba(253,248,240,0.97);
    border: 1px solid rgba(193,127,60,0.35);
    border-radius: 6px;
    padding: 28px 26px 24px;

    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.45s forwards;

    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;

      var(--mahogany) 20%,
      var(--amber) 45%,
      var(--gold) 55%,
      var(--mahogany) 80%,
      var(--walnut) 100%

    position: absolute;
    top: 14px;
    right: 18px;
    font-size: 15px;
    color: var(--cream-deep);
    line-height: 1;

    font-weight: 700;

    align-items: center;
    gap: 10px;

    flex: 1;
    height: 1px;

    flex: 0 0 52px;

// ─── RNG & BUFFER ─────────────────────────────────────────────────

var _s = Date.now();
function rnd(){ _s=(_s*1664525+1013904223)&0xffffffff; return((_s>>>0)/4294967295); }
function pick(a){ return a[Math.floor(rnd()*a.length)]; }

var buf = [];
var BUF_MAX = 18;
function addBuf(t){ buf.push(t); if(buf.length>BUF_MAX) buf.shift(); }
function inBuf(t){
  return buf.some(function(b){
    var wa=new Set(b.toLowerCase().split(/\s+/).slice(0,12));
    var wb=new Set(t.toLowerCase().split(/\s+/).slice(0,12));
    var c=0; wa.forEach(function(w){ if(wb.has(w)) c++; });
    return c/Math.max(wa.size,wb.size,1)>0.45;
  });
}

var reviewCount = 0;
function useErrors(){ reviewCount++; return (reviewCount % 3 === 0); }

function compose(){
  var errs = useErrors();
  var style = Math.floor(rnd()*14);

  if(style===0){
    var op = errs ? pick(ERR_OPENERS) : pick(VISIT_OPENERS);
    var pr = pick(PRODUCT_QUALITY);

function buildReview(){
  _s = Date.now() ^ (Math.random()*0x7fffffff|0);
  var v, n=0;
  do { v=compose(); n++; } while(inBuf(v) && n<30);
  addBuf(v);
  return v;
}

var currentReview = "";

function displayReview(anim){
  var el = document.getElementById("reviewText");
  if(anim){
    el.classList.add("fade");
    setTimeout(function(){
      currentReview = buildReview();
      el.textContent = currentReview;
      el.classList.remove("fade");
    },180);
  } else {
    currentReview = buildReview();
    el.textContent = currentReview;
  }
}
